name: CaptainsLog
options:
  bundleIdPrefix: com.blakecrosley
  deploymentTarget:
    iOS: "26.0"
    macOS: "26.0"
    tvOS: "26.0"
    watchOS: "26.0"
  xcodeVersion: "26.4"
  createIntermediateGroups: true
  defaultConfig: Debug
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.2"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_LANGUAGE: en
    ENABLE_USER_SCRIPT_SANDBOXING: NO

packages:
  Kit941:
    path: ../941Kit

targets:
  CaptainsLog-iOS:
    type: application
    platform: iOS
    sources:
      - path: CaptainsLog
      - path: CaptainsLogShared
    resources:
      - path: CaptainsLog/Resources
        excludes:
          - "**/.gitkeep"
    dependencies:
      - package: Kit941
        product: Kit941
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blakecrosley.captainslog
        PRODUCT_NAME: "Captain's Log"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: M4WTLM6RAQ
        CODE_SIGN_ENTITLEMENTS: CaptainsLog/App/CaptainsLog.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: CaptainsLog/App/CaptainsLog-iOS-Info.plist
        SUPPORTS_MACCATALYST: NO
        SWIFT_EMIT_LOC_STRINGS: YES

  CaptainsLog-macOS:
    type: application
    platform: macOS
    sources:
      - path: CaptainsLog
      - path: CaptainsLogShared
    resources:
      - path: CaptainsLog/Resources
        excludes:
          - "**/.gitkeep"
    dependencies:
      - package: Kit941
        product: Kit941
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blakecrosley.captainslog
        PRODUCT_NAME: "Captain's Log"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: M4WTLM6RAQ
        CODE_SIGN_ENTITLEMENTS: CaptainsLog/App/CaptainsLog.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Captain's Log"
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_EMIT_LOC_STRINGS: YES

  CaptainsLog-watchOS:
    type: application
    platform: watchOS
    sources:
      - path: CaptainsLogCompanion
      - path: CaptainsLogShared
    resources:
      - path: CaptainsLogCompanion/Resources
        excludes:
          - "**/.gitkeep"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blakecrosley.captainslog.watchkitapp
        PRODUCT_NAME: "Captain's Log"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: M4WTLM6RAQ
        CODE_SIGN_ENTITLEMENTS: CaptainsLogCompanion/CaptainsLogCompanion.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Captain's Log"
        INFOPLIST_KEY_WKApplication: YES
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.blakecrosley.captainslog
        SWIFT_EMIT_LOC_STRINGS: YES

  CaptainsLog-tvOS:
    type: application
    platform: tvOS
    sources:
      - path: CaptainsLogCompanion
      - path: CaptainsLogShared
    resources:
      - path: CaptainsLogCompanion/Resources
        excludes:
          - "**/.gitkeep"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blakecrosley.captainslog
        PRODUCT_NAME: "Captain's Log"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: M4WTLM6RAQ
        CODE_SIGN_ENTITLEMENTS: CaptainsLogCompanion/CaptainsLogCompanion.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: "App Icon & Top Shelf Image"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Captain's Log"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIUserInterfaceStyle: Automatic
        SWIFT_EMIT_LOC_STRINGS: YES

  CaptainsLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CaptainsLogTests
    dependencies:
      - target: CaptainsLog-iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blakecrosley.captainslog.tests
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: M4WTLM6RAQ
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Captain's Log.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Captain's Log"
        BUNDLE_LOADER: "$(TEST_HOST)"

  CaptainsLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CaptainsLogUITests
    dependencies:
      - target: CaptainsLog-iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blakecrosley.captainslog.uitests
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: M4WTLM6RAQ
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: CaptainsLog-iOS
